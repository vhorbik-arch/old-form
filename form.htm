function Valida(form){
   if (form.realname.value == "") { 
      alert("Por favor escriba su Nombre y Apellido.");
      form.realname.focus();
      return false;
   }
   if (form.email.value.indexOf("@")<3){
       alert("La direccion e-mail no es valida. Por favor" 
       +" introduzca una direccion que contenga el simbolo '@'.");
       }
       if ((form.email.value.indexOf(".com")<5)&&(form.email.value.indexOf(".org")<5)
          &&(form.email.value.indexOf(".gov")<5)&&(form.email.value.indexOf(".net")<5)
          &&(form.email.value.indexOf(".es")<5)
          &&(form.email.value.indexOf(".mil")<5)&&(form.email.value.indexOf(".edu")<5)){
          alert("La direccion e-mail no es valida."
          +" La direccion e-mail debe contener un sufijo del tipo "
          +".com, .net, .org, .gov, .mil, .es, .edu");
          form.email.focus();
          return false;
   }
   if (form.ciudad.value == "") { 
      alert("Ingrese su Domicilio.");
      form.domicilio.focus();
      return false;
   }
   if (form.codigo.value == "") { 
      alert("Ingrese su Código Postal");
      form.codigo.focus();
      return false;
   }
   if (form.provincia.value == "") { 
      alert("Ingrese su Ciudad de Residencia.");
      form.ciudad.focus();
      return false;
   }if (form.comentario.value == "") { 
      alert("Debe explicar el motivo de su mail");
      form.comentario.focus();
      return false;
   }
   alert("Datos Completos, se procederá al envio del correo."+
          " Nos comunicaremos con Ud. a la Brevedad");
      form.submit(); 
}	
</SCRIPT>
